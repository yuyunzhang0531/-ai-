<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>✨ 追星物料 AI 生成器</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ 追星物料 AI 生成器</h1>
            <p>选模板 + 传照片 = 专属应援物</p>
        </header>

        <div class="main-content">
            <div class="template-section">
                <h2>📋 1. 选择类型</h2>
                <div class="category-filters">
                    <button class="filter-btn active" data-category="all">全部</button>
                    <button class="filter-btn" data-category="badge">吧唧</button>
                    <button class="filter-btn" data-category="photocard">小卡</button>
                </div>

                <h2 style="margin-top: 20px;">🎨 2. 选择风格</h2>
                <div class="style-filters">
                    <button class="style-btn active" data-style="all">全部</button>
                    <button class="style-btn" data-style="sweet">甜酷风</button>
                    <button class="style-btn" data-style="ins">ins风</button>
                </div>

                <div class="scroll-area">
                    <h3 style="margin-top: 15px;">🧱 底图模板</h3>
                    <div class="template-grid" id="template-grid">
                        </div>

                    <h3 style="margin-top: 15px;">🖼 贴纸素材</h3>
                    <div class="template-grid" id="sticker-grid">
                        </div>
                </div>
            </div>

            <div class="action-section">
                <h2>📸 3. 上传照片</h2>
                <div class="upload-area" id="upload-area">
                    <input type="file" id="photo-upload" accept="image/*" hidden>
                    <p>📸 点击上传爱豆照片</p>
                    <small>支持 jpg/png，自动 AI 抠图</small>
                </div>

                <div id="loading-status" style="display:none; margin:15px 0; color:#d63384; font-weight:600; text-align:center;">
                    ⏳ AI 正在智能抠图，请稍候...
                </div>

                <div class="layer-control-panel" style="margin-top: 15px; padding: 10px; background: #fff5f8; border-radius: 8px; border: 1px dashed #d63384;">
                    <h3 style="font-size: 14px; margin-bottom: 8px;">✨ 图层管理 (点击选中物体后操作)</h3>
                    <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                        <button id="btn-bring-front" class="layer-btn">置于顶层</button>
                        <button id="btn-forward" class="layer-btn">上移一层</button>
                        <button id="btn-backward" class="layer-btn">下移一层</button>
                        <button id="btn-send-back" class="layer-btn">置于底层</button>
                    </div>
                </div>

                <div class="canvas-preview-box" style="margin-top: 20px;">
                    <h3>🖼 画布预览</h3>
                    <div class="canvas-container-wrapper" style="border: 2px solid #eee; background: #f9f9f9;">
                        <canvas id="preview-canvas"></canvas> 
                    </div>
                    <p style="font-size: 12px; color: #666; margin-top: 10px;">
                        💡 <b>提示：</b>点击底图、人物或贴纸即可选中。手机端选中后点击“删除选中”即可移除。
                    </p>
                </div>

                <div class="button-group" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:20px;">
                     <button id="generate-btn" class="primary-btn" disabled style="flex:1; background:#ff69b4; border:none; color:white; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">✨ 开始 AI 抠图生成</button>
    
                     <div style="width:100%; display:flex; gap:10px;">
                          <button id="download-btn" class="primary-btn" style="flex:1; background:#28a745; border:none; color:white; padding:10px; border-radius:8px; cursor:pointer;">⬇️ 下载作品</button>
                          <button id="reset-btn" class="secondary-btn" style="flex:1; background:#f0f0f0; border:1px solid #ccc; color:#333; padding:10px; border-radius:8px; cursor:pointer;">🔄 重置</button>
                          <button id="delete-btn" class="layer-btn" style="flex:1; background: #dc3545; color: white; border-color: #dc3545;">🗑️ 删除选中</button>
                    </div>
                </div>
                
                <div class="selection-info" style="margin-top: 15px; font-size: 13px;">
                    <p>已选底图：<span id="template-name" style="color:#d63384;">未选择</span></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
